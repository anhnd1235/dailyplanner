<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskFlow Pro – Ứng dụng quản lý công việc thông minh với calendar, dashboard và biểu đồ." />
  <title>TaskFlow Pro – Quản lý Công việc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       RESET & DESIGN TOKENS
    ═══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --bg2: #e4e7ec;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --surface-glass: rgba(255,255,255,0.72);
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --primary: #6366f1;
      --primary-light: #eef2ff;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99,102,241,0.25);
      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-light: #fffbeb;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --text: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --radius: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Dark Theme ── */
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --surface: #1e293b;
      --surface2: #334155;
      --surface-glass: rgba(30,41,59,0.82);
      --border: #334155;
      --border-light: #1e293b;
      --primary: #818cf8;
      --primary-light: rgba(129,140,248,0.12);
      --primary-hover: #6366f1;
      --primary-glow: rgba(129,140,248,0.3);
      --success: #34d399;
      --success-light: rgba(52,211,153,0.12);
      --warning: #fbbf24;
      --warning-light: rgba(251,191,36,0.12);
      --danger: #f87171;
      --danger-light: rgba(248,113,113,0.12);
      --text: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --text-light: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.2);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ═══════════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════════ */
    header {
      background: var(--surface-glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 32px;
      flex-shrink: 0;
    }
    .logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .logo svg rect, .logo svg path {
      stroke: var(--primary);
    }

    .nav-tabs { display: flex; gap: 4px; flex: 1; }
    .nav-tab {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }
    .nav-tab:hover { background: var(--primary-light); color: var(--text); }
    .nav-tab.active {
      background: var(--primary-light);
      color: var(--primary);
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      border-radius: 3px;
      background: var(--primary);
    }

    .header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
    .header-btn {
      width: 38px; height: 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-size: 18px;
      transition: all var(--transition);
      position: relative;
    }
    .header-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .header-btn svg { width: 18px; height: 18px; }

    /* Language dropdown */
    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: none;
      z-index: 200;
      min-width: 150px;
      animation: dropIn 0.15s ease;
    }
    .lang-dropdown.show { display: block; }
    .lang-option {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s;
      border: none;
      background: transparent;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }
    .lang-option:hover { background: var(--primary-light); }
    .lang-option.active { color: var(--primary); background: var(--primary-light); }
    .lang-option .flag { font-size: 18px; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════════════════════════════ */
    main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    .section { display: none; }
    .section.active { display: block; }

    /* ═══════════════════════════════════════════════════════════════
       TASKS TAB: CALENDAR + TODO SIDE BY SIDE
    ═══════════════════════════════════════════════════════════════ */
    .tasks-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── Calendar Panel ── */
    .calendar-panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      position: sticky;
      top: 88px;
      transition: box-shadow var(--transition), background var(--transition);
    }
    .calendar-panel:hover { box-shadow: var(--shadow-md); }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .cal-nav { display: flex; gap: 6px; align-items: center; }
    .cal-nav-btn {
      width: 30px; height: 30px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .cal-nav-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .cal-today-btn {
      padding: 5px 12px;
      border-radius: 100px;
      border: 1.5px solid var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .cal-today-btn:hover { background: var(--primary); color: #fff; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: all var(--transition);
      position: relative;
      gap: 3px;
    }
    .cal-day:hover { background: var(--primary-light); }
    .cal-day.other-month { color: var(--text-light); opacity: 0.5; }
    .cal-day.today {
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 2px 8px var(--primary-glow);
    }
    .cal-day.today:hover { background: var(--primary-hover); }
    .cal-day.selected {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      outline: 2px solid var(--primary);
      outline-offset: -2px;
    }
    .cal-day.today.selected {
      background: var(--primary);
      color: #fff;
      outline-color: var(--primary-hover);
    }
    .cal-dots {
      display: flex;
      gap: 3px;
      height: 5px;
    }
    .cal-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .cal-dot.all-done { background: var(--success); }
    .cal-dot.has-pending { background: var(--warning); }
    .cal-dot.none-done { background: var(--danger); }

    /* ── Todo Panel ── */
    .todo-panel { min-width: 0; }

    .selected-date-bar {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      transition: all var(--transition);
    }
    .selected-date-bar:hover { box-shadow: var(--shadow-md); }
    .date-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
    }
    .date-info { flex: 1; }
    .date-info .date-main { font-size: 16px; font-weight: 700; color: var(--text); }
    .date-info .date-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Add Form ── */
    .add-form {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      transition: all var(--transition);
    }
    .add-form:focus-within {
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }
    .add-form input[type="text"] {
      flex: 1;
      min-width: 200px;
      height: 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      transition: all var(--transition);
    }
    .add-form input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .add-form input[type="text"]::placeholder { color: var(--text-light); }

    .priority-select {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      cursor: pointer;
      height: 44px;
      transition: all var(--transition);
    }
    .priority-select:focus { border-color: var(--primary); }

    .btn-add {
      height: 44px;
      padding: 0 20px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--primary-glow); }
    .btn-add:active { transform: translateY(0); }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px var(--primary-glow);
    }
    .count-badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
      font-weight: 500;
    }

    /* ── Task Cards ── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all var(--transition);
      border-left: 4px solid transparent;
      animation: fadeSlideIn 0.25s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .task-card.done {
      opacity: 0.7;
      background: var(--surface2);
      border-left-color: var(--success) !important;
    }
    .task-card.done:hover { opacity: 0.85; }
    .task-card.priority-high   { border-left-color: var(--danger); }
    .task-card.priority-medium { border-left-color: var(--warning); }
    .task-card.priority-low    { border-left-color: var(--text-light); }

    .task-check {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      background: var(--surface);
    }
    .task-check:hover { border-color: var(--success); background: var(--success-light); transform: scale(1.1); }
    .task-card.done .task-check { border-color: var(--success); background: var(--success); }
    .task-check svg { display: none; }
    .task-card.done .task-check svg { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .task-card.done .task-text { text-decoration: line-through; color: var(--text-muted); }

    .task-edit-input {
      display: none;
      width: 100%;
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      line-height: 1.6;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .status-badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 100px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-badge.pending { background: var(--warning-light); color: var(--warning); }
    .status-badge.done    { background: var(--success-light); color: var(--success); }
    .priority-badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 100px;
    }
    .priority-badge.high   { background: var(--danger-light);  color: var(--danger); }
    .priority-badge.medium { background: var(--warning-light); color: var(--warning); }
    .priority-badge.low    { background: var(--bg);            color: var(--text-muted); }
    .task-time { font-size: 11px; color: var(--text-light); }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .action-btn {
      width: 32px; height: 32px;
      border: none; border-radius: var(--radius-sm);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-muted);
      transition: all var(--transition);
    }
    .action-btn:hover { background: var(--bg); transform: scale(1.1); }
    .action-btn.edit:hover   { color: var(--primary); background: var(--primary-light); }
    .action-btn.delete:hover { color: var(--danger); background: var(--danger-light); }

    .task-card.editing .task-text { display: none; }
    .task-card.editing .task-edit-input { display: block; }
    .task-card.editing .edit-actions { display: flex !important; }
    .edit-actions { display: none; gap: 6px; margin-top: 8px; }
    .btn-sm {
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      border-radius: var(--radius-sm); border: none; cursor: pointer;
      transition: all var(--transition); font-family: inherit;
    }
    .btn-save   { background: var(--success); color: #fff; }
    .btn-save:hover { background: #059669; transform: translateY(-1px); }
    .btn-cancel { background: var(--bg); color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-cancel:hover { border-color: var(--text-muted); }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-state svg { opacity: 0.2; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; font-weight: 600; }
    .empty-state small { font-size: 13px; color: var(--text-light); display: block; margin-top: 4px; }

    /* ═══════════════════════════════════════════════════════════════
       DASHBOARD
    ═══════════════════════════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .stat-value { font-size: 32px; font-weight: 800; }
    .stat-card.total::before   { background: linear-gradient(90deg, var(--primary), #a855f7); }
    .stat-card.total .stat-value { color: var(--primary); }
    .stat-card.done::before    { background: var(--success); }
    .stat-card.done .stat-value { color: var(--success); }
    .stat-card.pending::before { background: var(--warning); }
    .stat-card.pending .stat-value { color: var(--warning); }
    .stat-card.today::before   { background: var(--danger); }
    .stat-card.today .stat-value { color: var(--danger); }

    .progress-bar-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      transition: all var(--transition);
    }
    .progress-bar-wrap:hover { box-shadow: var(--shadow-md); }
    .progress-bar-wrap h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .progress-track {
      background: var(--border);
      border-radius: 100px;
      height: 14px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #a855f7, var(--success));
      background-size: 200% 100%;
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .progress-label { margin-top: 8px; font-size: 13px; color: var(--text-muted); text-align: right; font-weight: 500; }

    /* ── Chart Card ── */
    .chart-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      transition: all var(--transition);
    }
    .chart-card:hover { box-shadow: var(--shadow-md); }
    .chart-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .chart-top h3 { font-size: 15px; font-weight: 700; }
    .chart-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chart-period-btns { display: flex; gap: 4px; }
    .chart-period-btn {
      padding: 6px 14px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .chart-period-btn:hover { border-color: var(--primary); color: var(--primary); }
    .chart-period-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chart-nav { display: flex; align-items: center; gap: 6px; }
    .chart-nav-label {
      font-size: 13px; font-weight: 600;
      color: var(--text);
      min-width: 160px;
      text-align: center;
    }
    .chart-wrap { position: relative; height: 280px; }
    .chart-summary {
      display: flex;
      gap: 28px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .cs-item { display: flex; flex-direction: column; gap: 2px; }
    .cs-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .cs-value { font-size: 24px; font-weight: 800; }

    .recent-section { margin-top: 24px; }
    .recent-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }

    /* ═══════════════════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════════════════ */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
    }
    .toast {
      background: var(--text);
      color: var(--surface);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
    }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error   { background: var(--danger); color: #fff; }
    @keyframes toastIn {
      from { transform: translateX(60px) scale(0.9); opacity: 0; }
      to   { transform: translateX(0) scale(1); opacity: 1; }
    }

    /* ═══════════════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .tasks-layout {
        grid-template-columns: 1fr;
      }
      .calendar-panel {
        position: static;
      }
    }
    @media (max-width: 600px) {
      header { padding: 0 12px; height: 56px; }
      .logo { font-size: 17px; margin-right: 12px; }
      .nav-tab { padding: 6px 12px; font-size: 13px; }
      main { padding: 16px 10px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .chart-top { flex-direction: column; }
      .chart-nav-label { min-width: 120px; font-size: 12px; }
      .add-form { flex-direction: column; }
      .add-form input[type="text"] { min-width: 100%; }
      .header-actions { gap: 4px; }
      .header-btn { width: 34px; height: 34px; }
    }

    /* ═══════════════════════════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
  
    /* ── Auth UI ── */
    .user-profile {

</style>

let currentLang = localStorage.getItem('taskflow_lang') || 'vi';
function t(key) { return (i18n[currentLang] || i18n.vi)[key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  // Update priority select
  const sel = document.getElementById('priorityInput');
  sel.options[0].text = t('priority_high');
  sel.options[1].text = t('priority_medium');
  sel.options[2].text = t('priority_low');
  document.documentElement.lang = currentLang;
}

function setLang(lang) {

const FAKE_TASKS = [
  'Review code PR','Write unit tests','Update docs','Fix null pointer bug',
  'Daily standup','Deploy new feature','Refactor service','Check emails',
  'Update tickets','Client requirements','Design UI mockup','Deploy staging',
  'API performance check','Database backup','Weekly report','Code review',
  'Optimize SQL','Setup CI/CD','Integration test','Handle QA feedback',
  'Setup dev env','Production logs','Sprint planning','Demo to PM',
];

function hash32(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h;
}

function getFakeTasksForDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return [];
  const today = new Date(); today.setHours(0,0,0,0);
  if (d >= today) return [];
  const h0 = hash32(dateStr);
  const dow = d.getDay();
  const isWeekend = dow === 0 || dow === 6;
  if (h0 % 100 < (isWeekend ? 50 : 15)) return [];
  const count = (h0 % 5) + (isWeekend ? 1 : 3);
  const daysAgo = Math.floor((today - d) / 86400000);
  const basePct = 82 - (daysAgo / (365*5)) * 40;
  const tasks = [];
  for (let i = 0; i < count; i++) {
    const th = hash32(dateStr + '_' + i);
    const noise = ((th % 41) - 20);
    const donePct = Math.max(5, Math.min(98, basePct + noise));
    tasks.push({
      id: `fake_${dateStr}_${i}`,
      text: FAKE_TASKS[th % FAKE_TASKS.length],
      priority: ['high','medium','low'][(th >> 5) % 3],
      done: (th % 100) < donePct,
      createdAt: new Date(d.getFullYear(), d.getMonth(), d.getDate(), 8 + (th % 10)).toISOString(),
    });
  }
  return tasks;
}

function getEffectiveTasksForChart(dateStr) {
  const real = loadData()[dateStr];
  return real !== undefined ? real : getFakeTasksForDate(dateStr);
}

function pct(tasks) {
  if (!tasks.length) return null;
  return Math.round(tasks.filter(t => t.done).length / tasks.length * 100);
}

// ══════════════════════════════════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════════════════════════════════
function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const titleEl = document.getElementById('calTitle');

  // Title
  titleEl.textContent = `${t('months')[calMonth]} ${calYear}`;

  // Build grid
  let html = '';

  // Day-of-week headers (Mon first)
  const dowLabels = t('dow_cal');
  for (let i = 0; i < 7; i++) {
    html += `<div class="cal-dow">${dowLabels[i]}</div>`;
  }

  // First day of month
  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Convert to Mon=0

  // Days in month
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  // Previous month fill
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevMonthDays - i;
    const m = calMonth === 0 ? 11 : calMonth - 1;
    const y = calMonth === 0 ? calYear - 1 : calYear;
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    html += `<div class="cal-day other-month" onclick="selectCalDate('${ds}')">${day}</div>`;
  }

  // Current month days
  const todayS = todayStr();
  const data = loadData();
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = ds === todayS;
    const isSelected = ds === selectedDate;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';

    // Task dots
    const tasks = data[ds] || [];
    let dots = '';
    if (tasks.length > 0) {
      const doneCount = tasks.filter(t => t.done).length;
      if (doneCount === tasks.length) {
        dots = '<div class="cal-dots"><div class="cal-dot all-done"></div></div>';
      } else if (doneCount > 0) {
        dots = '<div class="cal-dots"><div class="cal-dot has-pending"></div></div>';
      } else {
        dots = '<div class="cal-dots"><div class="cal-dot none-done"></div></div>';
      }
    }

    html += `<div class="${cls}" onclick="selectCalDate('${ds}')">${day}${dots}</div>`;
  }

  // Next month fill
  const totalCells = startDow + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const m = calMonth === 11 ? 0 : calMonth + 1;
    const y = calMonth === 11 ? calYear + 1 : calYear;
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    html += `<div class="cal-day other-month" onclick="selectCalDate('${ds}')">${i}</div>`;
  }

  grid.innerHTML = html;
}

function selectCalDate(ds) {
  selectedDate = ds;
  // If selected date is in a different month, navigate to it
  const d = new Date(ds);
  if (d.getMonth() !== calMonth || d.getFullYear() !== calYear) {
    calYear = d.getFullYear();
    calMonth = d.getMonth();
  }
  renderCalendar();
  updateDateBar();
  renderTasks();
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function goCalToday() {
  selectedDate = todayStr();
  initCalendarMonth();
  renderCalendar();
  updateDateBar();
  renderTasks();
}

function getTasksForDate(date) { return loadData()[date] || []; }
function saveTasksForDate(date, tasks) {
  const data = loadData();
  data[date] = tasks;
  saveData(data);
}

function addTask() {
  const input = document.getElementById('taskInput');
  const priority = document.getElementById('priorityInput').value;
  const text = input.value.trim();
  if (!text) { showToast(t('toast_empty'), 'error'); return; }
  const tasks = getTasksForDate(selectedDate);
  tasks.push({
    id: Date.now().toString(),
    text,
    priority,
    done: false,
    createdAt: new Date().toISOString()
  });
  saveTasksForDate(selectedDate, tasks);
  input.value = '';
  renderTasks();
  renderCalendar();
  updateDateBar();
  showToast(t('toast_added'), 'success');
}

function toggleTask(id) {
  const tasks = getTasksForDate(selectedDate);
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  task.doneAt = task.done ? new Date().toISOString() : null;
  saveTasksForDate(selectedDate, tasks);
  renderTasks();
  renderCalendar();
  updateDateBar();
  if (task.done) showToast(t('toast_completed'), 'success');
}

function deleteTask(id) {
  if (!confirm(t('confirm_delete'))) return;
  saveTasksForDate(selectedDate, getTasksForDate(selectedDate).filter(t => t.id !== id));
  renderTasks();
  renderCalendar();
  updateDateBar();
  showToast(t('toast_deleted'));
}

function startEdit(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const task = getTasksForDate(selectedDate).find(t => t.id === id);
  if (!card || !task) return;
  card.querySelector('.task-edit-input').value = task.text;
  card.classList.add('editing');
  card.querySelector('.task-edit-input').focus();
}
function cancelEdit(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) card.classList.remove('editing');
}
function saveEdit(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  const text = card.querySelector('.task-edit-input').value.trim();
  if (!text) { showToast(t('toast_empty_edit'), 'error'); return; }
  const tasks = getTasksForDate(selectedDate);
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.text = text;
  task.updatedAt = new Date().toISOString();
  saveTasksForDate(selectedDate, tasks);
  renderTasks();
  showToast(t('toast_updated'), 'success');
}

// ══════════════════════════════════════════════════════════════════
//  CHART
// ══════════════════════════════════════════════════════════════════
let chartPeriod = 'week';
let chartOffset = 0;
let chartInstance = null;

function setChartPeriod(period, btn) {
  chartPeriod = period;
  chartOffset = 0;
  document.querySelectorAll('.chart-period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}
function shiftChart(delta) { chartOffset += delta; renderChart(); }
function resetChart()      { chartOffset = 0;      renderChart(); }

function getChartDataset() {
  const today = new Date(); today.setHours(0,0,0,0);
  const lang = currentLang;

  if (chartPeriod === 'week') {
    const mon = new Date(today);
    const dow = mon.getDay() || 7;
    mon.setDate(mon.getDate() - dow + 1 + chartOffset * 7);

    const labels = [], values = [];
    const DAYS = t('dow_cal');
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      const ds = d.toISOString().slice(0,10);
      labels.push(`${DAYS[i]} ${d.getDate()}/${d.getMonth()+1}`);
      values.push(pct(getEffectiveTasksForChart(ds)));
    }
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const periodLabel = `${mon.getDate()}/${mon.getMonth()+1} – ${sun.getDate()}/${sun.getMonth()+1}/${sun.getFullYear()}`;
    return { labels, values, periodLabel };
  }

  if (chartPeriod === 'month') {
    const ref = new Date(today.getFullYear(), today.getMonth() + chartOffset, 1);
    const dim = new Date(ref.getFullYear(), ref.getMonth() + 1, 0).getDate();
    const labels = [], values = [];
    for (let day = 1; day <= dim; day++) {
      const d = new Date(ref.getFullYear(), ref.getMonth(), day);
      const ds = d.toISOString().slice(0,10);
      labels.push(String(day));
      values.push(pct(getEffectiveTasksForChart(ds)));
    }
    return { labels, values, periodLabel: `${t('months')[ref.getMonth()]} ${ref.getFullYear()}` };
  }

  // Year
  const year = today.getFullYear() + chartOffset;
  const labels = t('month_short');
  const values = [];
  for (let m = 0; m < 12; m++) {
    const dim = new Date(year, m + 1, 0).getDate();
    let total = 0, done = 0;
    for (let day = 1; day <= dim; day++) {
      const ds = new Date(year, m, day).toISOString().slice(0,10);
      const tasks = getEffectiveTasksForChart(ds);
      total += tasks.length;
      done += tasks.filter(t => t.done).length;
    }
    values.push(total ? Math.round(done / total * 100) : null);
  }
  return { labels, values, periodLabel: `${year}` };
}

function renderChart() {
  const { labels, values, periodLabel } = getChartDataset();
  document.getElementById('chartPeriodLabel').textContent = periodLabel;

  const valid = values.filter(v => v !== null);
  const avg = valid.length ? Math.round(valid.reduce((a,b)=>a+b,0)/valid.length) : 0;
  const max = valid.length ? Math.max(...valid) : 0;
  const min = valid.length ? Math.min(...valid) : 0;

  document.getElementById('chartSummary').innerHTML = `
    <div class="cs-item">
      <span class="cs-label">${t('avg')}</span>
      <span class="cs-value" style="color:var(--primary)">${avg}%</span>
    </div>
    <div class="cs-item">
      <span class="cs-label">${t('highest')}</span>
      <span class="cs-value" style="color:var(--success)">${max}%</span>
    </div>
    <div class="cs-item">
      <span class="cs-label">${t('lowest')}</span>
      <span class="cs-value" style="color:var(--danger)">${min}%</span>
    </div>
    <div class="cs-item">
      <span class="cs-label">${t('has_data')}</span>
      <span class="cs-value" style="color:var(--text-muted);font-size:18px">${valid.length}/${values.length}</span>
    </div>`;

  const canvas = document.getElementById('completionChart');
  const ctx = canvas.getContext('2d');

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const isDark = currentTheme === 'dark';
  const grad = ctx.createLinearGradient(0, 0, 0, 280);
  grad.addColorStop(0, isDark ? 'rgba(129,140,248,0.3)' : 'rgba(99,102,241,0.25)');
  grad.addColorStop(1, isDark ? 'rgba(129,140,248,0.0)' : 'rgba(99,102,241,0.0)');

  const gridColor = isDark ? 'rgba(148,163,184,0.1)' : '#e2e8f0';
  const tickColor = isDark ? '#64748b' : '#94a3b8';
  const lineColor = isDark ? '#818cf8' : '#6366f1';

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: t('chart_label'),
        data: values,
        borderColor: lineColor,
        backgroundColor: grad,
        borderWidth: 2.5,
        pointBackgroundColor: values.map(v =>
          v === null ? 'transparent' : v >= 75 ? '#10b981' : v >= 50 ? '#f59e0b' : '#ef4444'
        ),
        pointBorderColor: isDark ? '#1e293b' : '#fff',
        pointBorderWidth: 2,
        pointRadius: values.map(v => v === null ? 0 : 5),
        pointHoverRadius: 7,
        tension: 0.4,
        fill: true,
        spanGaps: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: isDark ? '#334155' : '#1e293b',
          titleFont: { size: 12, family: 'Inter' },
          bodyFont: { size: 13, family: 'Inter' },
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: c => c.parsed.y === null
              ? t('no_data')
              : `${t('chart_tooltip')}: ${c.parsed.y}%`,
          },
        },
      },
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { callback: v => v + '%', stepSize: 25, font: { size: 11, family: 'Inter' }, color: tickColor },
          grid: { color: gridColor },
          border: { display: false },
        },
        x: {
          ticks: {
            font: { size: 11, family: 'Inter' }, color: tickColor,
            maxRotation: 45, autoSkip: true,
            maxTicksLimit: chartPeriod === 'month' ? 15 : 20,
          },
          grid: { display: false },
          border: { display: false },
        },
      },
    },
  });
}

      <div class="task-card" style="cursor:pointer" onclick="goToDate('${ds}')">
        <div class="task-body">
          <div class="task-text" style="font-weight:700">${dowFull[date.getDay()]}, ${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}${ds===todayS ? ' ('+t('today')+')' : ''}</div>
          <div class="task-meta">
            <span class="status-badge done">${dc} ${t('completed_word')}</span>
            ${pend ? `<span class="status-badge pending">${pend} ${t('pending_word')}</span>` : ''}
            <span class="task-time">${tasks.length} ${t('total_word')} • ${perc}%</span>
          </div>
          <div class="progress-track" style="margin-top:8px;height:6px">
            <div class="progress-fill" style="width:${perc}%"></div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('dailySummary').innerHTML =
    rows || `<div class="empty-state"><p>${t('no_recent')}</p></div>`;

  renderChart();
}

function goToDate(ds) {
  selectedDate = ds;
  initCalendarMonth();
  switchTab('tasks');
  renderCalendar();
  updateDateBar();
  renderTasks();
}

// ══════════════════════════════════════════════════════════════════
//  TABS & TOAST
// ══════════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab === 'tasks' ? 'navTasks' : 'navDashboard').classList.add('active');
  if (tab === 'dashboard') renderDashboard();
}

function showToast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(40px)';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
applyTheme();
applyI18n();
initCalendarMonth();
renderCalendar();
updateDateBar();
renderTasks();
</script>
</body>
</html>
